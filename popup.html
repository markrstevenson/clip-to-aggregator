<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root { --accent: #2f5fd0; }
    body {
      width: 340px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }
    h1 { font-size: 14px; margin: 0 0 10px; }
    label { display: block; font-weight: 600; margin: 10px 0 3px; font-size: 12px; color: #444; }
    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
    }
    textarea { resize: vertical; }
    .url { color: #666; font-size: 11px; word-break: break-all; margin: 2px 0 0; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { background: #9bb0e0; cursor: default; }
    #status { text-align: center; margin-top: 10px; font-size: 12px; color: #1a7f37; min-height: 16px; }
  </style>
</head>
<body>
  <h1>📌 Clip to Aggregator</h1>

  <label for="title">Title</label>
  <input id="title" type="text">
  <p class="url" id="url"></p>

  <label for="category">Category</label>
  <select id="category">
    <option>News</option>
    <option>Technology</option>
    <option>Business</option>
    <option>Science</option>
    <option>Culture</option>
    <option>Opinion</option>
    <option>Other</option>
  </select>

  <label for="note">Why it matters (optional)</label>
  <textarea id="note" rows="2" placeholder="e.g. useful pattern worth revisiting later"></textarea>

  <label for="selection">Highlighted text (auto-captured)</label>
  <textarea id="selection" rows="3"></textarea>

  <button id="save">Save clip</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
